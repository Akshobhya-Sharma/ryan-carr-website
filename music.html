  <body>
    <header>
      <div class="navigation-container layout-flex layout-row layout-gap-md">

    <main>
      <section class="global-content-bg" id="music">
        <div class="layout-flex layout-column layout-gap-lg">
          <h1>Music by Ryan</h1>
          <hr />
          <h2>Videos</h2>
          <div class="video-grid">
            <div class="layout-flex layout-column layout-gap-sm">
              <div class="video-embed">
                <iframe
                  src="https://www.youtube.com/embed/EYNoBXQC8To?wmode=transparent&autoplay=0&mute=0&controls=1&rel=0"
                  title="Tall, Tall Grass"
                  allowfullscreen
                  loading="lazy"
                ></iframe>
              </div>
              <h3>Tall, Tall Grass</h3>
              <p class="body-regular">Video made by Dubplate Films.</p>
            </div>

            <div class="layout-flex layout-column layout-gap-sm">
              <div class="video-embed">
                <iframe
                  src="https://www.youtube.com/embed/XCHouhqUl24?wmode=transparent&autoplay=0&mute=0&controls=1&rel=0"
                  title="I'm Coming Home"
                  allowfullscreen
                  loading="lazy"
                ></iframe>
              </div>
              <h3>I'm Coming Home</h3>
              <p class="body-regular">Balcony TV Performance.</p>
            </div>

            <div class="layout-flex layout-column layout-gap-sm">
              <div class="video-embed">
                <iframe
                  src="https://www.youtube.com/embed/6urBekX3810?wmode=transparent&autoplay=0&mute=0&controls=1&rel=0"
                  title="The Healer"
                  allowfullscreen
                  loading="lazy"
                ></iframe>
              </div>
              <h3>The Healer</h3>
              <p class="body-regular">Here, Here & Here Acoustic Sessions.</p>
            </div>
          </div>
          <hr />
          <h2>Music</h2>
          <div class="layout-grid-content-sidebar layout-gap-lg">
            <div class="layout-flex layout-column layout-gap-lg">
              <iframe
                width="100%"
                height="180"
                scrolling="no"
                frameborder="no"
                allow="autoplay"
                loading="lazy"
                src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/soundcloud%253Atracks%253A139271596&color=%23484622&auto_play=false&hide_related=false&show_comments=true&show_user=true&show_reposts=false&show_teaser=true"
                title="You Can't Stop Progress — Ryan Carr on SoundCloud"
              ></iframe>
              <iframe
                width="100%"
                height="180"
                scrolling="no"
                frameborder="no"
                allow="autoplay"
                loading="lazy"
                src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/soundcloud%253Atracks%253A140462027&color=%23484622&auto_play=false&hide_related=false&show_comments=true&show_user=true&show_reposts=false&show_teaser=true"

                height="180"

                frameborder="no"

                loading="lazy"
                src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/soundcloud%253Atracks%253A266610901&color=%23484622&auto_play=false&hide_related=false&show_comments=true&show_user=true&show_reposts=false&show_teaser=true"
                title="Unfinished Business — Ryan Carr on SoundCloud"
              ></iframe>
            </div>

            <div>
              <img
                src="images/music-section.webp"
                alt="Ryan Carr with his guitar"
                decoding="async"
              />
            </div>
          </div>
