<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | Ryan Carr</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@400;500;600;700&family=Source+Sans+3:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css"
    />
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/fill/style.css"
    />
  </head>
  <body>
    <header>
      <div class="navigation-container layout-flex layout-row layout-gap-md">
        <a href="index.html" class="site-logo" aria-label="Ryan Carr home">
          <img src="images/RC.svg" alt="Ryan Carr" />
        </a>
        <nav>
          <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="music.html">Music</a></li>
            <li><a href="lessons.html">Lessons</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main>
      <section class="global-content-bg" id="contact">
        <div class="layout-two-col layout-row layout-gap-lg">
          <div class="layout-flex layout-column layout-gap-sm">
            <h1>Contact</h1>
            <hr />
            <h3>Ryan Carr</h3>
            <p>+1 647 526 7566</p>
            <p>ryanawcarr@gmail.com</p>
            <hr />
            <a
              href="https://facebook.com/YOUR_PAGE"
              target="_blank"
              rel="noopener noreferrer"
              class="contact-social-link"
            >
              <i class="ph-fill ph-facebook-logo icon-md"></i>
              <span class="body-small">facebook</span>
            </a>
            <a
              href="https://x.com/ryanawcarr"
              target="_blank"
              rel="noopener noreferrer"
              class="contact-social-link"
            >
              <i class="ph-fill ph-twitter-logo icon-md"></i>
              <span class="body-small">X (formerly Twitter)</span>
            </a>
          </div>
          <form
            id="contact-form"
            action="https://api.web3forms.com/submit"
            class="contact-form"
            novalidate
          >
            <input
              type="hidden"
              name="access_key"
              value="b7b04187-3176-4d89-8dff-24dc75838657"
            />

            <input type="checkbox" name="botcheck" style="display: none" />

            <div class="form-group">
              <label for="name">Name <span aria-hidden="true">*</span></label>
              <input
                type="text"
                id="name"
                name="name"
                autocomplete="name"
                required
                aria-required="true"
                placeholder="Your name"
              />
            </div>

            <div class="form-group">
              <label for="email">Email <span aria-hidden="true">*</span></label>
              <input
                type="email"
                id="email"
                name="email"
                autocomplete="email"
                required
                aria-required="true"
                placeholder="your@email.com"
              />
            </div>

            <div class="form-group">
              <label for="subject">Subject</label>
              <input
                type="text"
                id="subject"
                name="subject"
                autocomplete="off"
                placeholder="What's this about?"
              />
            </div>

            <div class="form-group">
              <label for="message">Message</label>
              <textarea
                id="message"
                name="message"
                rows="6"
                placeholder="Your message…"
              ></textarea>
            </div>

            <button type="submit" class="btn-submit">Send Message</button>
          </form>
        </div>
      </section>
    </main>
    <div class="toast" id="form-toast" role="alert" aria-live="polite"></div>
    <footer>
      <p>
        &copy; <span id="year"></span> | Designed with ❤️ by Ryan and friends.
      </p>
    </footer>

    <script src="js/main.js"></script>
  </body>
</html>
