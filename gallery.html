<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gallery | Ryan Carr</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@400;500;600;700&family=Source+Sans+3:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css"
    />
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/fill/style.css"
    />
  </head>
  <body>
    <header>
      <div class="navigation-container layout-flex layout-row layout-gap-md">
        <a href="index.html" class="site-logo" aria-label="Ryan Carr home">
          <img src="images/RC.svg" alt="Ryan Carr" />
        </a>
        <nav>
          <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="gallery.html" class="active">Gallery</a></li>
            <li><a href="music.html">Music</a></li>
            <li><a href="lessons.html">Lessons</a></li>
            <li><a href="contact.html">Contact</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main>
      <section class="global-content-bg" id="gallery">
        <div class="layout-flex layout-column layout-gap-lg">
          <h1>Gallery</h1>
          <div class="bento-grid">
            <figure class="bento-item">
              <img
                src="images/proper_roadies.webp"
                alt="Ryan's band holding Ryan up"
                decoding="async"
              />
              <figcaption>
                The band taking the role of the roadie way too far.
              </figcaption>
            </figure>

            <figure class="bento-item">
              <img
                src="images/Lullabies for City Life.webp"
                alt="Band performing at their album release"
                decoding="async"
              />
              <figcaption>
                The release party for Lullabies for City Life at Junction City
                Music Hall.
              </figcaption>
            </figure>

            <figure class="bento-item">
              <img
                src="images/Distillery.webp"
                alt="Ryan and band at Distillery District"
                decoding="async"
              />
              <figcaption>Photo shoot in the Distillery District.</figcaption>
            </figure>

            <figure class="bento-item">
              <img
                src="images/Bricks.webp"
                alt="Portrait photo of Ryan in black and white"
                decoding="async"
              />
              <figcaption>Handsome portrait photo of Ryan.</figcaption>
            </figure>

            <figure class="bento-item">
              <img
                src="images/Lullabies for City Life 2.webp"
                alt="A blurred and bokeh photo of the band performing"
                decoding="async"
              />
              <figcaption>Blurred and bokeh photo of the band.</figcaption>
            </figure>

            <figure class="bento-item">
              <img
                src="images/Harmonica Solo.webp"
                alt="Jordan from the band playing the harmonica"
                decoding="async"
              />
              <figcaption>Jordan tearing it up on harmonica.</figcaption>
            </figure>

            <figure class="bento-item">
              <img
                src="images/My Baby.webp"
                alt="Ryan's guitar, the Martin D21"
                decoding="async"
              />
              <figcaption>My sweet, sweet Martin D21.</figcaption>
            </figure>

            <figure class="bento-item">
              <img
                src="images/Thinking.webp"
                alt="Ryan with his guitar"
                decoding="async"
              />
              <figcaption>Thinking way too hard.</figcaption>
            </figure>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <p>
        &copy; <span id="year"></span> | Designed with ❤️ by Ryan and friends.
      </p>
    </footer>

    <script src="js/main.js"></script>
  </body>
</html>
